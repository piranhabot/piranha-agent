name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Test Job (Ubuntu only - free tier)
  # ============================================================================
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust_core

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          .venv
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short -x
      env:
        SECRET_KEY: test-secret-key-for-ci
        ALLOWED_ORIGINS: http://localhost:3000
        RATE_LIMIT_PER_MINUTE: 60

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # ============================================================================
  # Lint Job
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Run ruff
      run: ruff check .

    - name: Run mypy
      run: mypy piranha/ --ignore-missing-imports || true

  # ============================================================================
  # Build Job (Ubuntu only - free tier)
  # ============================================================================
  build:
    name: Build Wheels (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, lint]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}

    - name: Build wheel
      run: |
        pip install maturin
        maturin build --release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: piranha-wheels
        path: target/wheels/*.whl

# Note: macOS and Windows builds disabled due to GitHub Actions billing limits
# Enable when billing issues are resolved
